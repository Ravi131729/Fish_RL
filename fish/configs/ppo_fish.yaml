seed: 5

env:
  dt: 0.01
  max_steps: 1000
  delta_max: 1.3
  delta_rate_max: 5.0
  alpha_max: 4619
  alpha_rate_max: 87000
  max_heading_angle: 3.14159
  min_heading_angle: -3.14159
